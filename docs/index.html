<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードリストウォッチャー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .game-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #79c0ff;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 0.2rem;
    }

    .value {
      font-size: 1rem;
      color: #e6edf3;
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .value:last-child { margin-bottom: 0; }

    .code {
      display: inline-block;
      background: #1f6feb22;
      border: 1px solid #1f6feb55;
      border-radius: 4px;
      padding: 0.1em 0.5em;
      font-family: monospace;
      font-size: 0.95rem;
      color: #79c0ff;
    }

    .new-code {
      background: #2ea04322;
      border-color: #2ea04355;
      color: #56d364;
    }

    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .error {
      color: #f85149;
      background: #f8514922;
      border: 1px solid #f8514944;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    .no-data { color: #8b949e; font-style: italic; font-size: 0.9rem; }

    .loading { color: #8b949e; font-style: italic; text-align: center; padding: 2rem 0; }

    footer {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #6e7681;
      border-top: 1px solid #21262d;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎴 カードリストウォッチャー</h1>
    <div id="content" class="loading">読み込み中…</div>
    <footer>
      データは GitHub Actions により 10 分ごとに自動更新されます。<br>
      <a href="https://github.com/tarousinpo/cardListWatch" target="_blank" rel="noopener">
        tarousinpo/cardListWatch
      </a>
    </footer>
  </div>

  <script>
    (async () => {
      const el = document.getElementById('content');

      try {
        const res = await fetch('status.json?_=' + Date.now());
        if (!res.ok) throw new Error(`status.json の取得に失敗しました (HTTP ${res.status})`);
        const data = await res.json();

        // Support both old single-object format and new array format
        const games = Array.isArray(data) ? data : [data];

        if (games.length === 0 || games.every(g => !g.latest_code && !g.fetch_error)) {
          el.innerHTML = '<p class="no-data">まだデータがありません。最初のワークフロー実行をお待ちください。</p>';
          return;
        }

        el.innerHTML = games.map(g => renderGame(g)).join('');
      } catch (err) {
        el.innerHTML = `<div class="game-card"><p class="error">エラー: ${escHtml(err.message)}<br><br>
          <strong>ヒント:</strong> GitHub Pages が有効になっているか、
          また最初のワークフロー実行が完了しているかご確認ください。</p></div>`;
      }
    })();

    function renderGame(g) {
      const checkedAt = g.checked_at ? new Date(g.checked_at).toLocaleString('ja-JP') : '—';
      const changedAt = g.changed_at ? new Date(g.changed_at).toLocaleString('ja-JP') : '—';
      const label = escHtml(g.label || g.key || 'Unknown');

      let body = '';

      if (g.fetch_error) {
        body += `<div class="error">取得エラー: ${escHtml(g.fetch_error)}</div>`;
      }

      if (g.latest_code) {
        body += `
          <div class="label">最新セット名</div>
          <div class="value">${escHtml(g.latest_name || g.latest_code)}</div>

          <div class="label">プロダクトコード</div>
          <div class="value"><span class="code">${escHtml(g.latest_code)}</span></div>`;

        if (g.new_codes && g.new_codes.length > 0) {
          const newCodeBadges = g.new_codes
            .map(c => `<span class="code new-code">${escHtml(c)}</span>`)
            .join(' ');
          body += `
          <div class="label">🆕 前回から追加されたセット</div>
          <div class="value">${newCodeBadges}</div>`;
        }

        const knownCount = g.known_codes ? g.known_codes.length : null;
        if (knownCount !== null) {
          body += `
          <div class="label">収録弾数（既知）</div>
          <div class="value">${knownCount} セット</div>`;
        }

        body += `
          <div class="label">最終確認日時</div>
          <div class="value">${escHtml(checkedAt)}</div>

          <div class="label">最終更新検出日時</div>
          <div class="value">${escHtml(changedAt)}</div>

          <div class="label">カードリスト</div>
          <div class="value">
            <a href="${escHtml(g.source_url)}" target="_blank" rel="noopener">
              ${escHtml(g.source_url)}
            </a>
          </div>`;
      } else if (!g.fetch_error) {
        body += `<p class="no-data">まだデータがありません。最初のワークフロー実行をお待ちください。</p>`;
      }

      return `<div class="game-card"><div class="game-title">🎮 ${label}</div>${body}</div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
