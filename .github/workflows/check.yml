name: Check Card Lists

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions UI

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run card-list checker
        run: node scripts/check.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit updated status.json (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update status.json [skip ci]"
            git push
          fi
