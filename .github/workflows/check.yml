name: Check Card Lists

on:
  schedule:
    # 2026-03-06 JST のみ 1 分間隔で実行（gate ジョブで日付チェック）
    - cron: '* * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions UI

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.date.outputs.should_run }}
    steps:
      - name: Check today's date (JST)
        id: date
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$TODAY_JST" = "2026-03-06" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping scheduled run: today is $TODAY_JST (1-min interval is for 2026-03-06 only)"
          fi

  check:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run card-list checker
        run: node scripts/check.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit updated status.json (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update status.json [skip ci]"
            git push
          fi
